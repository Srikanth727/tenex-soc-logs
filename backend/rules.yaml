rules:
  - name: high_request_volume
    mitre_tag: T1110
    severity: high
    description: >-
      Unusually high number of requests from a single source IP relative to
      other IPs in this log file (z-score above threshold), consistent with
      automated or brute-force activity.
    zscore_threshold: 2.5

  - name: off_hours_risky_access
    mitre_tag: T1133
    severity: medium
    description: >-
      Access to a risky URL category outside normal business hours,
      consistent with use of external remote services to evade monitoring.
    business_hours_start: 8
    business_hours_end: 18
    risky_categories:
      - "Proxy/Anonymizer"
      - "Malicious Sites"
      - "Peer to Peer"
      - "Hacking"
      - "Unknown"
      - "Remote Access Tools"
      - "Spyware Callback"

  - name: threat_detected
    mitre_tag: T1566
    severity: critical
    description: >-
      Zscaler flagged a known threat signature on this request, indicating a
      likely phishing or malware delivery attempt.

  - name: large_data_transfer
    mitre_tag: T1041
    severity: high
    description: >-
      Response size exceeds the configured threshold, consistent with
      large-scale data exfiltration over an existing command channel.
    max_response_bytes: 104857600
